<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Login</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body>

    <div class="background"></div>

    <div class="login-container">

        <!-- LEFT SIDE -->

        <div class="brand-section">

            <img
                src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/25.gif"
                alt="Pikachu"
                class="pikachu"
            >

            <h1>Task Manager</h1>

            <p>
                Welcome back.
                Login and continue managing
                your workflow smarter and faster.
            </p>

        </div>

        <!-- RIGHT SIDE -->

        <div class="form-section">

            <form class="login-form">

                <h2>Welcome Back</h2>

                <p class="subtitle">
                    Login to continue
                </p>

                <div class="input-group">

                    <label>Email Address</label>

                    <input
                        type="email"
                        placeholder="you@example.com"
                    >

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <input
                        type="password"
                        placeholder="Enter password"
                    >

                </div>

                <div class="options">

                    <label class="remember">

                        <input type="checkbox">

                        Remember me

                    </label>

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>

                <button type="submit">
                    Login
                </button>

                <p class="signup-text">

                    Don’t have an account?

                    <a href="signup.html">
                        Create Account
                    </a>

                </p>

            </form>

        </div>

    </div>

</body>

</html>
